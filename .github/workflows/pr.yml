name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Create Neon branch off production
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          parent_branch: production
          branch_name: preview/pr-${{ github.event.number }}

      - name: Run migrations against preview DB
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm db:migrate

      - run: pnpm build

      - name: Deploy preview version to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --var DATABASE_URL:${{ steps.neon.outputs.db_url }} --preview-alias pr-${{ github.event.number }} --message "PR #${{ github.event.number }} (${{ github.event.pull_request.head.sha }})"

      - name: Comment preview info on PR
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        with:
          script: |
            const match = (process.env.DEPLOY_OUTPUT || '').match(/(https:\/\/[a-z0-9-]+\.workers\.dev)/i)
            const url = match ? match[1] : null
            const body = [
              '### Preview deployed',
              '',
              `- **Neon branch:** \`preview/pr-${context.issue.number}\` (forked from \`production\`)`,
              url
                ? `- **Worker preview:** ${url}`
                : '- **Worker preview:** URL not parsed — check "Deploy preview version" step logs',
              url
                ? `- **Smoke test:** \`curl ${url}/api/health\` should return \`{"ok":true,"testUserCount":N}\``
                : '- **Smoke test:** \`curl <preview-url>/api/health\``,
            ].join('\n')

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
