name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.prettierrc'
      - '.prettierignore'
      - 'eslint.config.js'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Create Neon branch off production
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          parent_branch: production
          branch_name: preview/pr-${{ github.event.number }}

      - name: Run migrations against preview DB
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm db:migrate

      - run: pnpm build

      - name: Deploy preview version to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --var DATABASE_URL:${{ steps.neon.outputs.db_url }} --preview-alias pr-${{ github.event.number }} --message "PR #${{ github.event.number }} (${{ github.event.pull_request.head.sha }})"

      - name: Resolve workers.dev subdomain
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sub=$(curl -fsS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            | jq -r '.result.subdomain')
          echo "subdomain=$sub" >> "$GITHUB_OUTPUT"

      - name: Comment preview info on PR
        uses: actions/github-script@v7
        env:
          SUBDOMAIN: ${{ steps.cf.outputs.subdomain }}
        with:
          script: |
            const n = context.issue.number
            const url = `https://pr-${n}-trademe.${process.env.SUBDOMAIN}.workers.dev`
            const body = [
              '### Preview deployed',
              '',
              `- **Neon branch:** \`preview/pr-${n}\` (forked from \`production\`)`,
              `- **Worker preview:** ${url}`,
            ].join('\n')

            github.rest.issues.createComment({
              issue_number: n,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
